# =============================================================================
# EventCraft — AWS SAM Template
# Declares ALL Lambda functions, API Gateway, IAM roles
# Deploy: sam build && sam deploy --config-env staging
# =============================================================================

AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: EventCraft Platform — serverless backend

# ── Parameters ────────────────────────────────────────────────────────────────
Parameters:
  Environment:
    Type: String
    AllowedValues: [staging, prod]
    Default: staging
  DynamoDBTable:
    Type: String
    Default: eventcraft-staging
  UsageTable:
    Type: String
    Default: eventcraft-usage-events-staging
  CognitoPoolId:
    Type: String
  S3DesignsBucket:
    Type: String
    Default: eventcraft-designs-staging
  S3ExportsBucket:
    Type: String
    Default: eventcraft-exports-staging
  S3MediaBucket:
    Type: String
    Default: eventcraft-media-staging
  LogLevel:
    Type: String
    Default: Information
    AllowedValues: [Debug, Information, Warning, Error]

# ── Globals ───────────────────────────────────────────────────────────────────
Globals:
  Function:
    Runtime: dotnet8
    Architectures: [arm64]          # Graviton2 — 20% cheaper than x86
    MemorySize: 512
    Timeout: 29                     # API GW max is 30s
    Environment:
      Variables:
        ENVIRONMENT:        !Ref Environment
        DYNAMODB_TABLE:     !Ref DynamoDBTable
        USAGE_TABLE:        !Ref UsageTable
        COGNITO_POOL_ID:    !Ref CognitoPoolId
        S3_DESIGNS_BUCKET:  !Ref S3DesignsBucket
        S3_EXPORTS_BUCKET:  !Ref S3ExportsBucket
        S3_MEDIA_BUCKET:    !Ref S3MediaBucket
        LOG_LEVEL:          !Ref LogLevel
        POWERTOOLS_SERVICE_NAME: eventcraft
        POWERTOOLS_LOG_LEVEL: !Ref LogLevel
        STRIPE_SECRET_ARN:    !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:eventcraft/${Environment}/stripe-secret-key
        ANTHROPIC_KEY_ARN:    !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:eventcraft/${Environment}/anthropic-api-key
        SENTRY_DSN_ARN:       !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:eventcraft/${Environment}/sentry-dsn
    Tracing: Active                 # X-Ray tracing on all Lambdas
    LoggingConfig:
      LogFormat: JSON               # Structured JSON → CloudWatch
      ApplicationLogLevel: !Ref LogLevel
      SystemLogLevel: WARN
    Tags:
      App: eventcraft
      Env: !Ref Environment

# ── API Gateway ───────────────────────────────────────────────────────────────
Resources:

  EventCraftApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref Environment
      Description: EventCraft HTTP API
      CorsConfiguration:
        AllowOrigins:
          - http://localhost:3000
          - !Sub https://eventcraft-${Environment}.your-domain.com
          - https://eventcraft.io
        AllowMethods: [GET, POST, PUT, DELETE, OPTIONS]
        AllowHeaders: [Content-Type, Authorization, X-Correlation-Id]
        MaxAge: 600
      Auth:
        Authorizers:
          CognitoAuthorizer:
            IdentitySource: $request.header.Authorization
            JwtConfiguration:
              Audience: []
              Issuer: !Sub https://cognito-idp.${AWS::Region}.amazonaws.com/${CognitoPoolId}
        DefaultAuthorizer: CognitoAuthorizer
      AccessLogSettings:
        DestinationArn: !GetAtt ApiLogGroup.Arn
        Format: '{"requestId":"$context.requestId","ip":"$context.identity.sourceIp","requestTime":"$context.requestTime","httpMethod":"$context.httpMethod","routeKey":"$context.routeKey","status":"$context.status","responseLength":"$context.responseLength","integrationLatency":"$context.integrationLatency","userAgent":"$context.identity.userAgent"}'
      Tags:
        App: eventcraft
        Env: !Ref Environment

  ApiLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/apigateway/eventcraft-${Environment}
      RetentionInDays: !If [IsProd, 90, 30]

  # ── Shared IAM Role ──────────────────────────────────────────────────────────
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub eventcraft-lambda-role-${Environment}
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: lambda.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/AWSXRayDaemonWriteAccess
      Policies:
        - PolicyName: EventCraftLambdaPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: [dynamodb:GetItem, dynamodb:PutItem, dynamodb:UpdateItem,
                         dynamodb:DeleteItem, dynamodb:Query, dynamodb:Scan,
                         dynamodb:BatchGetItem, dynamodb:BatchWriteItem]
                Resource:
                  - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${DynamoDBTable}
                  - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${DynamoDBTable}/index/*
                  - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${UsageTable}
                  - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${UsageTable}/index/*
              - Effect: Allow
                Action: [s3:GetObject, s3:PutObject, s3:DeleteObject, s3:GetObjectAttributes]
                Resource:
                  - !Sub arn:aws:s3:::${S3DesignsBucket}/*
                  - !Sub arn:aws:s3:::${S3ExportsBucket}/*
                  - !Sub arn:aws:s3:::${S3MediaBucket}/*
              - Effect: Allow
                Action: [secretsmanager:GetSecretValue]
                Resource:
                  - !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:eventcraft/${Environment}/*
              - Effect: Allow
                Action: [ses:SendEmail, ses:SendRawEmail]
                Resource: '*'
              - Effect: Allow
                Action: [sqs:SendMessage, sqs:ReceiveMessage, sqs:DeleteMessage, sqs:GetQueueAttributes]
                Resource: !Sub arn:aws:sqs:${AWS::Region}:${AWS::AccountId}:eventcraft-exports-${Environment}.fifo
              - Effect: Allow
                Action: [logs:CreateLogGroup, logs:CreateLogStream, logs:PutLogEvents]
                Resource: !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/eventcraft-*

  # ── Lambda: Events ───────────────────────────────────────────────────────────
  EventsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub eventcraft-events-${Environment}
      Description: Event CRUD, RSVP, microsite management
      CodeUri: apps/api/EventCraft.Lambda.Events/
      Handler: EventCraft.Lambda.Events::EventCraft.Lambda.Events.Function::FunctionHandler
      Role: !GetAtt LambdaExecutionRole.Arn
      Events:
        CreateEvent:   { Type: HttpApi, Properties: { ApiId: !Ref EventCraftApi, Method: POST,   Path: /events } }
        GetEvent:      { Type: HttpApi, Properties: { ApiId: !Ref EventCraftApi, Method: GET,    Path: /events/{eventId} } }
        UpdateEvent:   { Type: HttpApi, Properties: { ApiId: !Ref EventCraftApi, Method: PUT,    Path: /events/{eventId} } }
        DeleteEvent:   { Type: HttpApi, Properties: { ApiId: !Ref EventCraftApi, Method: DELETE, Path: /events/{eventId} } }
        ListEvents:    { Type: HttpApi, Properties: { ApiId: !Ref EventCraftApi, Method: GET,    Path: /events } }
        PublishEvent:  { Type: HttpApi, Properties: { ApiId: !Ref EventCraftApi, Method: POST,   Path: /events/{eventId}/publish } }
        SubmitRsvp:    { Type: HttpApi, Properties: { ApiId: !Ref EventCraftApi, Method: POST,   Path: /events/{eventId}/rsvp, Auth: { Authorizer: NONE } } }
        GetRsvps:      { Type: HttpApi, Properties: { ApiId: !Ref EventCraftApi, Method: GET,    Path: /events/{eventId}/rsvp } }
        GetMicrosite:  { Type: HttpApi, Properties: { ApiId: !Ref EventCraftApi, Method: GET,    Path: /e/{slug}, Auth: { Authorizer: NONE } } }
        HealthCheck:   { Type: HttpApi, Properties: { ApiId: !Ref EventCraftApi, Method: GET,    Path: /health, Auth: { Authorizer: NONE } } }

  # ── Lambda: Design ───────────────────────────────────────────────────────────
  DesignFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub eventcraft-design-${Environment}
      Description: Canvas design save/load, template library, AI generation
      CodeUri: apps/api/EventCraft.Lambda.Design/
      Handler: EventCraft.Lambda.Design::EventCraft.Lambda.Design.Function::FunctionHandler
      MemorySize: 1024              # AI calls need more memory
      Timeout: 60                   # AI generation can take longer
      Role: !GetAtt LambdaExecutionRole.Arn
      Events:
        SaveDesign:      { Type: HttpApi, Properties: { ApiId: !Ref EventCraftApi, Method: PUT,  Path: /designs/{designId} } }
        GetDesign:       { Type: HttpApi, Properties: { ApiId: !Ref EventCraftApi, Method: GET,  Path: /designs/{designId} } }
        ListDesigns:     { Type: HttpApi, Properties: { ApiId: !Ref EventCraftApi, Method: GET,  Path: /designs } }
        AiGenerate:      { Type: HttpApi, Properties: { ApiId: !Ref EventCraftApi, Method: POST, Path: /designs/ai-generate } }
        ListTemplates:   { Type: HttpApi, Properties: { ApiId: !Ref EventCraftApi, Method: GET,  Path: /templates, Auth: { Authorizer: NONE } } }
        GetTemplate:     { Type: HttpApi, Properties: { ApiId: !Ref EventCraftApi, Method: GET,  Path: /templates/{templateId}, Auth: { Authorizer: NONE } } }

  # ── Lambda: Export ───────────────────────────────────────────────────────────
  ExportFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub eventcraft-export-${Environment}
      Description: PDF/PNG export via Puppeteer (triggered by SQS)
      CodeUri: apps/api/EventCraft.Lambda.Export/
      Handler: EventCraft.Lambda.Export::EventCraft.Lambda.Export.Function::FunctionHandler
      MemorySize: 2048              # Puppeteer/Chromium needs memory
      Timeout: 300                  # PDF render can take time
      Role: !GetAtt LambdaExecutionRole.Arn
      Events:
        RequestExport: { Type: HttpApi, Properties: { ApiId: !Ref EventCraftApi, Method: POST, Path: /exports } }
        GetExport:     { Type: HttpApi, Properties: { ApiId: !Ref EventCraftApi, Method: GET,  Path: /exports/{exportId} } }
        SqsTrigger:
          Type: SQS
          Properties:
            Queue: !Sub arn:aws:sqs:${AWS::Region}:${AWS::AccountId}:eventcraft-exports-${Environment}.fifo
            BatchSize: 1
            FunctionResponseTypes: [ReportBatchItemFailures]

  # ── Lambda: Notify ───────────────────────────────────────────────────────────
  NotifyFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub eventcraft-notify-${Environment}
      Description: SES email dispatch — invites, reminders, confirmations
      CodeUri: apps/api/EventCraft.Lambda.Notify/
      Handler: EventCraft.Lambda.Notify::EventCraft.Lambda.Notify.Function::FunctionHandler
      Role: !GetAtt LambdaExecutionRole.Arn
      Events:
        SendInvite:    { Type: HttpApi, Properties: { ApiId: !Ref EventCraftApi, Method: POST, Path: /notify/invite } }
        SendReminder:  { Type: HttpApi, Properties: { ApiId: !Ref EventCraftApi, Method: POST, Path: /notify/reminder } }
        NudgePending:  { Type: HttpApi, Properties: { ApiId: !Ref EventCraftApi, Method: POST, Path: /events/{eventId}/nudge } }

  # ── Lambda: QR ───────────────────────────────────────────────────────────────
  QrFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub eventcraft-qr-${Environment}
      Description: QR code generation, scan redirect, analytics
      CodeUri: apps/api/EventCraft.Lambda.QR/
      Handler: EventCraft.Lambda.QR::EventCraft.Lambda.QR.Function::FunctionHandler
      Role: !GetAtt LambdaExecutionRole.Arn
      Events:
        GenerateQr:  { Type: HttpApi, Properties: { ApiId: !Ref EventCraftApi, Method: POST,   Path: /qr } }
        GetQr:       { Type: HttpApi, Properties: { ApiId: !Ref EventCraftApi, Method: GET,    Path: /qr/{qrId} } }
        ScanRedirect: { Type: HttpApi, Properties: { ApiId: !Ref EventCraftApi, Method: GET,   Path: /q/{qrId}, Auth: { Authorizer: NONE } } }
        QrAnalytics: { Type: HttpApi, Properties: { ApiId: !Ref EventCraftApi, Method: GET,    Path: /qr/{qrId}/analytics } }

  # ── Lambda: Billing (Stripe usage metering) ───────────────────────────────────
  BillingFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub eventcraft-billing-${Environment}
      Description: Stripe billing, usage metering, plan management
      CodeUri: apps/api/EventCraft.Lambda.Billing/
      Handler: EventCraft.Lambda.Billing::EventCraft.Lambda.Billing.Function::FunctionHandler
      Role: !GetAtt LambdaExecutionRole.Arn
      Events:
        StripeWebhook:    { Type: HttpApi, Properties: { ApiId: !Ref EventCraftApi, Method: POST, Path: /billing/webhook, Auth: { Authorizer: NONE } } }
        GetSubscription:  { Type: HttpApi, Properties: { ApiId: !Ref EventCraftApi, Method: GET,  Path: /billing/subscription } }
        CreateCheckout:   { Type: HttpApi, Properties: { ApiId: !Ref EventCraftApi, Method: POST, Path: /billing/checkout } }
        GetUsage:         { Type: HttpApi, Properties: { ApiId: !Ref EventCraftApi, Method: GET,  Path: /billing/usage } }
        MonthlyMeter:
          Type: Schedule
          Properties:
            Schedule: cron(0 6 1 * ? *)   # 1st of every month at 6am UTC
            Description: Monthly Stripe usage metering

# ── Conditions ────────────────────────────────────────────────────────────────
Conditions:
  IsProd: !Equals [!Ref Environment, prod]

# ── Outputs ───────────────────────────────────────────────────────────────────
Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub https://${EventCraftApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}
    Export:
      Name: !Sub EventCraft-ApiUrl-${Environment}

  LambdaRoleArn:
    Description: Lambda execution role ARN
    Value: !GetAtt LambdaExecutionRole.Arn
